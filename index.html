<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Unity WebGL Player | EggRoom</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <style>
    /* 移除所有預設邊距，固定高度防止捲動 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden; /* 防止手機瀏覽器出現歪斜捲動 */
      font-family: Arial, sans-serif;
    }

    /* 舞台層：確保內容永遠置中 */
    #stage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100dvh; /* 使用動態視窗高度 */
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      /* 處理 iPhone 瀏海安全區域 */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      box-sizing: border-box;
    }

    /* 容器層：鎖定比例且不溢出螢幕 */
    #unity-container {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      /* 核心：確保不論寬高如何變化，都維持 16:9 */
      aspect-ratio: 16 / 9; 
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }

    #unity-canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
      touch-action: none; /* 防止遊戲中誤觸系統手勢 */
    }

    /* YouTube 疊加層：改用相對比例，確保在手機上位置正確 */
    #youtubeOverlay {
      position: absolute;
      left: 6%;
      top: 23%;
      width: 28%;
      height: 30%;
      z-index: 100;
      display: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease;
      background: #000;
    }

    #youtubeOverlay.visible {
      display: block !important;
      opacity: 1 !important;
      visibility: visible !important;
    }

    #youtubeFrame {
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* 載入條置中 */
    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }

    #unity-footer {
      display: none; /* 手機版通常不需要 Footer，建議隱藏以節省空間 */
    }

    /* 桌機版微調：如果螢幕夠大，顯示 Footer */
    @media (min-width: 1025px) {
      #unity-footer {
        display: flex;
        position: absolute;
        bottom: -30px; /* 放在遊戲畫面下方 */
        width: 100%;
        color: #fff;
      }
    }
  </style>
</head>

<body>
  <div id="stage">
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>

      <div id="youtubeOverlay">
        <iframe
          id="youtubeFrame"
          src=""
          allow="autoplay; encrypted-media; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>

      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.querySelector("#unity-canvas");
    const loadingBar = document.querySelector("#unity-loading-bar");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");

    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/0427.loader.js";
    const config = {
      dataUrl: buildUrl + "/0427.data.unityweb",
      frameworkUrl: buildUrl + "/0427.framework.js.unityweb",
      codeUrl: buildUrl + "/0427.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "EggRoom",
      productVersion: "0.1",
      matchWebGLToCanvasSize: true, // 關鍵：讓 Unity 自動適應 Canvas 大小
      devicePixelRatio: window.devicePixelRatio || 1, // 優化畫質
    };

    const script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = (100 * progress) + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";
        
        // 視窗縮放修正
        window.addEventListener('resize', () => {
            // 強制 Unity 重新計算佈局
            window.dispatchEvent(new Event('resize'));
        });
      }).catch((message) => {
        alert("載入失敗: " + message);
      });
    };
    document.body.appendChild(script);

    // YouTube 控制函式 (保留原本名稱以相容 Unity)
    window.showYouTubeVideo = window.ShowYoutubeVideo = function (videoId) {
      const overlay = document.getElementById("youtubeOverlay");
      const frame = document.getElementById("youtubeFrame");
      if (!overlay || !frame) return;

      frame.src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1&mute=1&playsinline=1&rel=0";
      overlay.classList.add("visible");
    };

    window.hideYouTubeVideo = window.HideYoutubeVideo = function () {
      const overlay = document.getElementById("youtubeOverlay");
      const frame = document.getElementById("youtubeFrame");
      if (frame) frame.src = "";
      if (overlay) overlay.classList.remove("visible");
    };
  </script>
</body>
</html>

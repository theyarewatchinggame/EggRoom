<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Unity WebGL Player | EggRoom</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      -webkit-text-size-adjust: 100%;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: #000;
    }

    #stage {
      position: relative;
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
      padding: max(12px, env(safe-area-inset-top)) 12px max(20px, env(safe-area-inset-bottom));
      overflow: visible;
    }

    #unity-container {
      position: relative !important;
      width: min(calc(100vw - 24px), calc((100dvh - 40px) * 16 / 9));
      aspect-ratio: 16 / 9;
      height: auto !important;
      margin: auto;
      background: #000;
      overflow: hidden;
    }

    #unity-canvas {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      display: block;
      background: #000;
      touch-action: manipulation;
    }

    #youtubeOverlay {
      position: absolute;
      left: 6%;
      top: 23%;
      width: 28%;
      height: 30%;
      z-index: 999999;
      display: none;
      opacity: 0;
      visibility: hidden;
      overflow: hidden;
      pointer-events: auto;
      transition: opacity 0.35s ease;
      background: #000;
      border: 0;
      box-sizing: border-box;
    }

    #youtubeOverlay.visible {
      display: block !important;
      opacity: 1 !important;
      visibility: visible !important;
    }

    #youtubePanel {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #youtubeFrame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      width: min(80%, 400px);
      display: none;
    }

    #unity-warning {
      position: absolute;
      left: 50%;
      top: 20px;
      transform: translateX(-50%);
      z-index: 30;
      width: calc(100% - 20px);
      max-width: 600px;
    }

    #unity-footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 25;
    }

    @media (max-width: 1024px) {
      html, body {
        height: auto !important;
        overflow-y: auto !important;
        display: block !important;
      }

      #stage {
        min-height: 100dvh !important;
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        padding: max(12px, env(safe-area-inset-top)) 12px max(20px, env(safe-area-inset-bottom)) !important;
      }

      #unity-container,
      .unity-mobile {
        position: relative !important;
        top: auto !important;
        left: auto !important;
        transform: none !important;
        width: min(calc(100vw - 24px), calc((100dvh - 40px) * 16 / 9)) !important;
        max-width: none !important;
        aspect-ratio: 16 / 9 !important;
        height: auto !important;
        max-height: calc(100dvh - 40px) !important;
        margin: auto !important;
        background: #000 !important;
        overflow: hidden !important;
      }

      #unity-footer {
        display: none !important;
      }
    }
  </style>
</head>

<body>
  <div id="stage">
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>

      <div id="youtubeOverlay">
        <div id="youtubePanel">
          <iframe
            id="youtubeFrame"
            src=""
            allow="autoplay; encrypted-media; picture-in-picture"
            allowfullscreen
            referrerpolicy="strict-origin-when-cross-origin">
          </iframe>
        </div>
      </div>

      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>

      <div id="unity-warning"></div>

      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">EggRoom</div>
      </div>
    </div>
  </div>

  <script>
    var stage = document.querySelector("#stage");
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var fullscreenButton = document.querySelector("#unity-fullscreen-button");
    var warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? "block" : "none";
      }
      var div = document.createElement("div");
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type == "error") {
        div.style = "background: red; padding: 10px;";
      } else {
        if (type == "warning") div.style = "background: yellow; padding: 10px;";
        setTimeout(function () {
          if (warningBanner.contains(div)) warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/0427.loader.js";
    var config = {
      dataUrl: buildUrl + "/0427.data.unityweb",
      frameworkUrl: buildUrl + "/0427.framework.js.unityweb",
      codeUrl: buildUrl + "/0427.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "EggRoom",
      productVersion: "0.1",
      showBanner: unityShowBanner,
      matchWebGLToCanvasSize: true,
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      container.className = "unity-mobile";
      canvas.className = "unity-mobile";
      config.devicePixelRatio = 1;
    }

    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = (100 * progress) + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";
        fullscreenButton.onclick = () => {
          if (stage.requestFullscreen) {
            stage.requestFullscreen();
          } else if (stage.webkitRequestFullscreen) {
            stage.webkitRequestFullscreen();
          } else {
            unityInstance.SetFullscreen(1);
          }
        };
        setTimeout(() => window.dispatchEvent(new Event("resize")), 300);
      }).catch((message) => {
        alert(message);
      });
    };

    script.onerror = () => {
      alert("loader 載入失敗，請確認 Build 檔名完全一致");
    };

    document.body.appendChild(script);

    window.showYouTubeVideo = window.ShowYoutubeVideo = function (videoId) {
      const overlay = document.getElementById("youtubeOverlay");
      const frame = document.getElementById("youtubeFrame");
      if (!overlay || !frame) return;

      frame.src = "";
      setTimeout(() => {
        frame.src =
          "https://www.youtube.com/embed/" +
          videoId +
          "?autoplay=1&mute=1&playsinline=1&rel=0&controls=1&modestbranding=1";
        overlay.classList.add("visible");
        overlay.style.display = "block";
      }, 80);
    };

    window.hideYouTubeVideo = window.HideYoutubeVideo = function () {
      const overlay = document.getElementById("youtubeOverlay");
      const frame = document.getElementById("youtubeFrame");
      if (frame) frame.src = "";
      if (overlay) {
        overlay.classList.remove("visible");
        overlay.style.display = "none";
      }
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Unity WebGL Player | EggRoom</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: auto;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      #page-wrap {
        width: 100%;
        min-height: 100%;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 16px;
        box-sizing: border-box;
      }

      #unity-container {
        position: relative;
        width: min(96vw, 1280px);
        aspect-ratio: 16 / 9;
        height: auto;
      }

      #unity-canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
        background: #231f20;
        border-radius: 14px;
      }

      #unity-loading-bar,
      #unity-warning,
      #unity-footer {
        position: absolute;
        left: 0;
        right: 0;
      }

      #unity-loading-bar {
        top: 50%;
        transform: translateY(-50%);
      }

      #unity-warning {
        top: 10px;
        z-index: 20;
      }

      #unity-footer {
        bottom: 0;
        z-index: 10;
      }

      @media (max-width: 900px) {
        #page-wrap {
          padding: 8px;
        }

        #unity-container {
          width: 100vw;
          max-width: 100vw;
        }

        #unity-canvas {
          border-radius: 0;
        }
      }

      @media (max-width: 700px) and (orientation: portrait) {
        #page-wrap {
          align-items: flex-start;
          padding: 0;
        }

        #unity-container {
          width: 100vw;
          max-width: 100vw;
        }
      }

      /* YouTube overlay */
      #youtubeOverlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.22);
        z-index: 9999;
        pointer-events: none;
      }

      #youtubePanel {
        position: absolute;
        left: 3%;
        top: 41%;
        transform: translateY(-50%);
        width: 42vw;
        max-width: 540px;
        aspect-ratio: 16 / 9;
        background: rgba(20,12,30,0.92);
        border: 3px solid #d8b4ff;
        border-radius: 22px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.35);
        overflow: hidden;
        pointer-events: auto;
      }

      #youtubeFrame {
        width: 100%;
        height: 100%;
        display: block;
      }

      #youtubeClose {
        position: absolute;
        top: 10px;
        right: 10px;
        padding: 6px 10px;
        border: none;
        border-radius: 10px;
        background: rgba(0,0,0,0.65);
        color: white;
        font-size: 14px;
        cursor: pointer;
        z-index: 2;
      }

      @media (max-width: 900px) {
        #youtubePanel {
          left: 2%;
          top: 38%;
          width: 48vw;
          max-width: none;
        }
      }

      @media (max-width: 700px) and (orientation: portrait) {
        #youtubePanel {
          left: 50%;
          top: 32%;
          transform: translate(-50%, -50%);
          width: 92vw;
          max-width: none;
          border-radius: 18px;
        }
      }
    </style>
  </head>

  <body>
    <div id="youtubeOverlay">
      <div id="youtubePanel">
        <iframe
          id="youtubeFrame"
          src=""
          frameborder="0"
          allow="autoplay; encrypted-media; picture-in-picture"
          allowfullscreen>
        </iframe>

        <button
          id="youtubeClose"
          onclick="
            document.getElementById('youtubeFrame').src='';
            document.getElementById('youtubeOverlay').style.display='none';
          "
        >✕</button>
      </div>
    </div>

    <div id="page-wrap">
      <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>

        <div id="unity-loading-bar">
          <div id="unity-logo"></div>
          <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
          </div>
        </div>

        <div id="unity-warning"></div>

        <div id="unity-footer">
          <div id="unity-webgl-logo"></div>
          <div id="unity-fullscreen-button"></div>
          <div id="unity-build-title">EggRoom</div>
        </div>
      </div>
    </div>

    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);

        if (type == 'error') {
          div.style = 'background: red; padding: 10px;';
        } else {
          if (type == 'warning') {
            div.style = 'background: yellow; padding: 10px;';
          }
          setTimeout(function() {
            if (warningBanner.contains(div)) {
              warningBanner.removeChild(div);
            }
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Build.loader.js";
      var config = {
        dataUrl: buildUrl + "/Build.data.unityweb",
        frameworkUrl: buildUrl + "/Build.framework.js.unityweb",
        codeUrl: buildUrl + "/Build.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "EggRoom",
        productVersion: "0.1",
        showBanner: unityShowBanner,
      };

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = (100 * progress) + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
          fullscreenButton.onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
